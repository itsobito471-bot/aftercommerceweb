<!-- =========================================================
  SIDE-NAV COMPONENT — AfterCommerce Glassmorphism
========================================================== -->
<div class="shell animate-bg-appear" [attr.data-theme]="isLightTheme ? 'light' : null">

  <div class="shell-bg-grid" aria-hidden="true"></div>
  <div class="shell-bg-orb shell-bg-orb--tl" aria-hidden="true"></div>
  <div class="shell-bg-orb shell-bg-orb--br" aria-hidden="true"></div>

  <!-- Mobile Backdrop -->
  <div class="sidebar-backdrop animate-bg-appear" *ngIf="isMobileOpen" (click)="closeMobileSidebar()">
  </div>

  <!-- ── SIDEBAR ─────────────────────────────────────── -->
  <aside class="sidebar animate-sidebar" [class.sidebar--expanded]="!isSidebarCollapsed && windowWidth >= 768"
    [class.sidebar--collapsed]="isSidebarCollapsed && windowWidth >= 768" [class.sidebar--mobile-open]="isMobileOpen"
    [class.sidebar--mobile-closed]="!isMobileOpen && windowWidth < 768">

    <!-- Brand strip -->
    <div class="sidebar__brand">
      <div class="sidebar__logo-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" />
          <line x1="3" y1="6" x2="21" y2="6" />
          <path d="M16 10a4 4 0 01-8 0" />
        </svg>
      </div>
      <div *ngIf="(!isSidebarCollapsed && windowWidth >= 768) || isMobileOpen" class="sidebar__brand-text">
        <span class="sidebar__logo-text">AfterCommerce</span>
        <span class="sidebar__logo-subtext">ADMIN CONSOLE</span>
      </div>

      <button class="sidebar__mobile-close ml-auto" *ngIf="isMobileOpen" (click)="closeMobileSidebar()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>
    </div>

    <!-- Navigation -->
    <nav class="sidebar__nav scrollbar-premium" aria-label="Main navigation">

      <p class="sidebar__section-label" *ngIf="(!isSidebarCollapsed && windowWidth >= 768) || isMobileOpen">Overview</p>

      <ul class="sidebar__nav-list">
        <li *ngFor="let item of menuItems; let i = index" class="sidebar__nav-item" [class]="'stagger-' + (i + 1)">
          <a [routerLink]="item.route" routerLinkActive="sidebar__link--active"
            [routerLinkActiveOptions]="{exact: false}" class="sidebar__link group"
            [class.sidebar__link--icon-only]="isSidebarCollapsed && windowWidth >= 768"
            [title]="isSidebarCollapsed ? item.label : ''" (click)="closeMobileSidebar()">
            <span class="sidebar__link-icon">
              <span nz-icon [nzType]="item.icon"></span>
            </span>
            <span *ngIf="(!isSidebarCollapsed && windowWidth >= 768) || isMobileOpen" class="sidebar__link-label">{{
              item.label }}</span>
          </a>
        </li>
      </ul>
    </nav>

    <!-- Footer -->
    <div class="sidebar__footer">


      <a routerLink="/admin/settings" class="sidebar__footer-action"
        [class.sidebar__footer-action--icon-only]="isSidebarCollapsed && windowWidth >= 768">
        <span class="sidebar__link-icon">
          <i nz-icon nzType="setting" nzTheme="outline"></i>
        </span>
        <span *ngIf="(!isSidebarCollapsed && windowWidth >= 768) || isMobileOpen"
          class="sidebar__link-label">Settings</span>
      </a>

      <a routerLink="/admin/profile" class="sidebar__footer-action"
        [class.sidebar__footer-action--icon-only]="isSidebarCollapsed && windowWidth >= 768">
        <span class="sidebar__link-icon">
          <i nz-icon nzType="user" nzTheme="outline"></i>
        </span>
        <span *ngIf="(!isSidebarCollapsed && windowWidth >= 768) || isMobileOpen" class="sidebar__link-label">My
          Profile</span>
      </a>

      <button (click)="logout()" class="sidebar__footer-action sidebar__footer-action--logout"
        [class.sidebar__footer-action--icon-only]="isSidebarCollapsed && windowWidth >= 768"
        [title]="isSidebarCollapsed ? 'Sign Out' : ''">
        <span class="sidebar__link-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
        </span>
        <span *ngIf="(!isSidebarCollapsed && windowWidth >= 768) || isMobileOpen" class="sidebar__link-label">Sign
          Out</span>
      </button>
    </div>

  </aside>

  <!-- ── CONTENT AREA ───────────────────────────────── -->
  <div class="content-area">

    <header class="topbar animate-header">

      <div class="topbar__left">
        <button (click)="toggleSidebar()" class="topbar__icon-btn"
          [attr.aria-label]="isSidebarCollapsed ? 'Expand sidebar' : 'Collapse sidebar'">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="18" x2="21" y2="18" />
          </svg>
        </button>

        <div class="topbar__breadcrumb" *ngIf="windowWidth >= 768">
          <span class="topbar__breadcrumb-root">AfterCommerce</span>
          <span class="topbar__breadcrumb-sep">›</span>
          <span class="topbar__breadcrumb-page">{{ currentPageTitle }}</span>
        </div>
      </div>

      <div class="topbar__right">

        <!-- Search -->
        <div class="topbar__search">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input type="text" placeholder="Search orders, products..." class="topbar__search-input" />
        </div>

        <!-- Theme toggle -->
        <button (click)="toggleTheme()" class="topbar__icon-btn" aria-label="Toggle theme">
          <svg *ngIf="!isLightTheme" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5" />
            <line x1="12" y1="1" x2="12" y2="3" />
            <line x1="12" y1="21" x2="12" y2="23" />
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
            <line x1="1" y1="12" x2="3" y2="12" />
            <line x1="21" y1="12" x2="23" y2="12" />
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
          </svg>
          <svg *ngIf="isLightTheme" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
          </svg>
        </button>

        <!-- Notifications -->
        <div class="topbar__notif-wrap">
          <button class="topbar__icon-btn" aria-label="Notifications">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9" />
              <path d="M13.73 21a2 2 0 01-3.46 0" />
            </svg>
          </button>
          <span class="topbar__notif-dot" aria-hidden="true"></span>
        </div>

        <!-- User chip -->
        <button class="topbar__user-chip" id="user-menu-btn" aria-label="User menu">
          <div class="topbar__avatar">{{ userInitials }}</div>
          <div class="topbar__user-info" *ngIf="windowWidth >= 900">
            <span class="topbar__user-name">{{ userName }}</span>
            <span class="topbar__user-role">{{userRole}}</span>
          </div>
        </button>

      </div>
    </header>

    <main class="main-content scrollbar-premium animate-main">
      <router-outlet></router-outlet>
    </main>

  </div>
</div>
