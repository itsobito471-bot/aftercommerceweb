<div class="page-header animate-header">
    <div class="header-content">
        <h1 class="page-title">Onboarding Form Preview</h1>
        <p class="page-subtitle">Drag and drop questions to reorder your student onboarding flow.</p>
    </div>

    <button routerLink="kyc-form" class="btn-primary">
        <span nz-icon nzType="plus"></span> Add New Field
    </button>
</div>

<div class="form-preview-envelope animate-card-enter">
    
    <div *ngIf="isLoading || isSavingOrder" class="loading-overlay" style="border-radius: 12px;">
        <div class="spinner"></div>
        <p *ngIf="isSavingOrder" style="margin-top: 10px; font-weight: 600;">Saving Order...</p>
    </div>

    <div class="form-preview-header">
        <h3 class="preview-title">Student KYC Setup</h3>
        <p class="preview-subtitle">Please complete your profile to access the course catalog.</p>
    </div>

    <div *ngIf="!isLoading && fields.length === 0" class="glass-card" style="text-align: center; padding: 3rem;">
        <p style="color: var(--color-text-muted);">No fields created yet.</p>
    </div>

    <div cdkDropList (cdkDropListDropped)="drop($event)">

        <div *ngFor="let field of fields" cdkDrag class="preview-field-card" [class.inactive-field]="!field.is_active">
            
            <div class="drag-handle-grip" cdkDragHandle title="Drag to reorder">
                <span nz-icon nzType="holder"></span>
            </div>

            <div class="card-header-flex">
                <label class="field-preview-label">
                    {{ field.label }} 
                    <span *ngIf="field.is_required" class="required-asterisk">*</span>
                    <span *ngIf="!field.is_active" class="inactive-tag">(Hidden)</span>
                </label>

                <div class="action-pill">
                    <span class="order-text">#{{ field.order_index }}</span>
                    <button class="icon-btn" (click)="editField(field._id)" title="Edit Field">
                        <span nz-icon nzType="edit"></span>
                    </button>
                    <button class="icon-btn" (click)="toggleStatus(field)" [title]="field.is_active ? 'Hide Field' : 'Show Field'" [class.active-icon]="!field.is_active">
                        <span nz-icon [nzType]="field.is_active ? 'eye' : 'eye-invisible'"></span>
                    </button>
                </div>
            </div>
            
            <p *ngIf="field.description" class="field-preview-desc">
                {{ field.description }}
            </p>

            <div class="fake-input-wrapper">
                <input *ngIf="field.input_type === 'TEXT' || field.input_type === 'NUMBER'" type="text" class="faux-input" disabled placeholder="Short answer text...">
                
                <textarea *ngIf="field.input_type === 'TEXTAREA'" class="faux-input" disabled rows="3" placeholder="Long answer text..."></textarea>
                
                <select *ngIf="field.input_type === 'DROPDOWN'" class="faux-input" disabled>
                    <option value="" disabled selected>Select an option...</option>
                </select>

                <div *ngIf="field.input_type === 'DATE'" class="faux-input faux-flex">
                    <span>dd/mm/yyyy</span>
                    <span nz-icon nzType="calendar"></span>
                </div>

                <div *ngIf="field.input_type === 'FILE'" class="faux-input faux-file">
                    <span nz-icon nzType="upload" style="font-size: 20px;"></span>
                    <span style="margin-left: 10px;">Upload Document / Image</span>
                </div>
            </div>
        </div>
        
    </div>
</div>
