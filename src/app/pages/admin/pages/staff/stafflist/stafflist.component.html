<div class="page-header animate-header">
    <div class="header-content">
        <div class="page-label-wrap">
            <span class="page-label-root">Team</span>
            <span class="page-label-sep">›</span>
            <span class="page-label-current">Staff Directory</span>
        </div>
        <h1 class="page-title">Team Management</h1>
        <p class="page-subtitle">Manage administrative staff and instructors.</p>
    </div>

    <button routerLink="../staff/staff-form" class="btn-primary">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
        <span>Add Staff Member</span>
    </button>
</div>

<div class="metrics-grid">
    </div>

<div class="glass-card animate-card-enter">
    <div class="table-toolbar">
        <div class="search-box">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input type="text" class="glass-input search-input" placeholder="Search categories..."
                [(ngModel)]="searchQuery" (keyup.enter)="onSearch()">
        </div>
    </div>

    <nz-table #basicTable 
              [nzData]="staffList" 
              [nzLoading]="isLoading" 
              [nzPageSize]="10"
              [nzScroll]="{ x: '1000px', y: '60vh' }"
              class="glass-nz-table">
        <thead>
            <tr>
                <th>Name</th>
                <th>Email Address</th>
                <th>Role</th>
                <th>Status</th>
                <th style="text-align: right;">Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let staff of basicTable.data">
                <td>
                    <div class="user-cell">
                        <div class="avatar">{{ staff.name.charAt(0) | uppercase }}</div>
                        <span class="fw-600">{{ staff.name }}</span>
                    </div>
                </td>
                <td class="text-muted">{{ staff.email }}</td>
                <td>
                    <span class="role-text">{{ staff.role }}</span>
                </td>
                <td>
                    <span class="glass-badge"
                        [ngClass]="staff.is_blocked ? 'glass-badge--inactive' : 'glass-badge--active'">
                        {{ staff.is_blocked ? 'Blocked' : 'Active' }}
                    </span>
                </td>
                <td style="text-align: right;">
                    <button class="action-btn action-edit" (click)="editStaff(staff._id)">
                        <span nz-icon nzType="edit" nzTheme="outline"></span>
                    </button>
                    <button class="action-btn action-delete" (click)="deleteStaff(staff._id, staff.name)">
                        <span nz-icon nzType="delete" nzTheme="outline"></span>
                    </button>
                </td>
            </tr>
        </tbody>
    </nz-table>
</div>
